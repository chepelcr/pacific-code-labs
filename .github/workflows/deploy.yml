name: Deploy DXP to GitHub Pages

# Builds the public marketing site (@workspace/dxp) and publishes it to
# GitHub Pages. The admin CMS panel is a local-only authoring tool and is
# intentionally NOT shipped in this build: VITE_ENABLE_ADMIN is left unset,
# so `import.meta.env.DEV === false` gates the `/admin/*` routes and the
# navbar link out of the production bundle (they are tree-shaken away).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment; cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Custom domain is served at the apex of the subdomain, so the app lives at
  # the site root. (For a default github.io project site, use "/<repo>/".)
  BASE_PATH: "/"
  # vite.config.ts requires PORT even for `build`; the value is irrelevant here.
  PORT: "5000"
  CUSTOM_DOMAIN: "pacific-code-labs.jcampos.dev"
  # Run the JS actions on Node 24 now (GitHub forces this on 2026-06-16); silences
  # the Node-20 deprecation warning. Remove once Node 24 is the runner default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        # Filtered install: only the DXP and its workspace deps — skips the
        # backend (api-server/db) so CI stays fast and needs no native esbuild.
        run: pnpm install --frozen-lockfile --filter "@workspace/dxp..."

      - name: Build DXP (production, admin disabled)
        env:
          NODE_ENV: production
        run: pnpm --filter @workspace/dxp run build

      - name: Add custom domain (CNAME)
        # The build step pre-renders per-route static HTML (incl. a noindex
        # 404.html SPA fallback) via scripts/prerender.mjs, so no cp step here.
        run: echo "$CUSTOM_DOMAIN" > artifacts/dxp/dist/public/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/dxp/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # IndexNow key — also hosted at /<key>.txt (public/). Not secret: the file
      # is public by design. Push-notifies Bing/Yandex/AI engines on each deploy.
      INDEXNOW_KEY: "395197df96a5632dfa44a1e6d7ee5f13"
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Ping IndexNow (Bing / Yandex / AI engines)
        # Runs after the site (and the key file) is live. Submits every
        # language-prefixed URL. Update SLUGS if routes change (see CLAUDE.md).
        run: |
          HOST="$CUSTOM_DOMAIN"
          LANGS="es en"
          SLUGS="products services about philosophy case-studies contact privacy terms"
          urls=""
          for l in $LANGS; do
            urls="$urls\"https://$HOST/$l\","
            for s in $SLUGS; do urls="$urls\"https://$HOST/$l/$s\","; done
          done
          urls="${urls%,}"
          curl -sS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{\"host\":\"$HOST\",\"key\":\"$INDEXNOW_KEY\",\"keyLocation\":\"https://$HOST/$INDEXNOW_KEY.txt\",\"urlList\":[$urls]}" \
            || echo "IndexNow ping failed (non-fatal)"
